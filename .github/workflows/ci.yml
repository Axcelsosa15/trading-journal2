name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dev dependencies (jsdom for the test harness)
        run: npm install --no-audit --no-fund
      - name: Syntax check (app.js, sw.js)
        run: npm run check
      - name: Guard against app.js being gutted
        run: |
          lines=$(wc -l < app.js)
          echo "app.js has $lines lines"
          if [ "$lines" -lt 2000 ]; then
            echo "::error::app.js has only $lines lines (expected 2000+) — a bad merge likely collapsed the main app file. This exact regression took production down before (PR #61)."
            exit 1
          fi
      - name: Headless smoke tests
        run: npm test
