name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dev dependencies (jsdom for the test harness)
        run: npm install --no-audit --no-fund
      - name: Syntax check (app.js, sw.js)
        run: npm run check
      - name: Headless smoke tests
        run: npm test
